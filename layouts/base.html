<!doctype html>
<html lang="{{htmlLang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="{{author}}" />
    <meta name="description" content="{{description}}" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#fffff8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#151515" media="(prefers-color-scheme: dark)" />
    {{keywords}}
    <title>{{title}}</title>
    <link rel="canonical" href="{{canonicalUrl}}" />
    <link rel="alternate" type="application/rss+xml" title="{{siteTitle}}" href="/rss.xml" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    {{ogTags}}
    {{jsonLd}}
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      rel="preload"
      href="/fonts/et-book-roman-line-figures.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/et-book-display-italic-old-style-figures.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/et-book-bold-line-figures.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    {{css}}
  </head>
  <body>
    <nav>{{nav}}</nav>

    <main>
      <article>
        <section>{{content}}</section>
      </article>
    </main>

    <footer class="footer">
      <p>
        &copy; {{year}} {{author}}. <a href="/rss.xml">RSS</a> |
        <a href="/sitemap.xml">Sitemap</a>{{footerLlms}}
      </p>
    </footer>

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
    ></script>
    {{scripts}}
  </body>
</html>
